<div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;font-size:12px;color:var(--color-text-secondary)">
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#7F77DD;display:inline-block;"></span>풀AI 입점</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#1D9E75;display:inline-block;"></span>미입점</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#D3D1C7;display:inline-block;"></span>국내/일본 시장</span>
</div>
<div style="position:relative;width:100%;height:340px;">
  <canvas id="mktChart"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = ['ReelShort','DramaBox','GoodShort','ShortMax','NetShort','Dramawave','FreeReels','Vigloo','Bump','Shortcha'];
const revenue = [728, 650, 288, 250, 200, 198, 0.05, 11.8, 2.2, 0.24];
const mau = [39.7, 58.3, 18.4, 13.2, 21.4, 21.6, 21.7, 0.83, 0.23, 0.026];
const aiColors = [
  '#1D9E75','#1D9E75','#1D9E75','#7F77DD','#7F77DD',
  '#1D9E75','#1D9E75','#7F77DD','#1D9E75','#1D9E75'
];
new Chart(document.getElementById('mktChart'), {
  type: 'bubble',
  data: {
    datasets: labels.map((l, i) => ({
      label: l,
      data: [{ x: mau[i], y: revenue[i], r: Math.max(5, Math.sqrt(revenue[i]) * 2.2) }],
      backgroundColor: aiColors[i] + 'cc',
      borderColor: aiColors[i],
      borderWidth: 1
    }))
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding: 20 },
    scales: {
      x: {
        title: { display: true, text: 'MAU (백만명)', font: { size: 11 } },
        min: -2, max: 70,
        ticks: { font: { size: 10 }, callback: v => v + 'M' }
      },
      y: {
        title: { display: true, text: '연매출 ($M)', font: { size: 11 } },
        min: -30, max: 820,
        ticks: { font: { size: 10 }, callback: v => '$' + v + 'M' }
      }
    },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => {
            const d = ctx.raw;
            return ctx.dataset.label + ' | MAU: ' + d.x.toFixed(1) + 'M | 매출: $' + d.y + 'M';
          }
        }
      }
    }
  }
});
</script>
